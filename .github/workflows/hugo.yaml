# Build Hugo site and deploy to Tencent Cloud (COS + CloudBase)
#
# Trigger: push to main branch
# Environment: Ubuntu 24.04, Hugo 0.147.8 (extended)
# Targets:
#   1. COS (Object Storage) — via coscmd
#   2. CloudBase Static Website Hosting — via cloudbase-cli

name: Build and Deploy to Tencent Cloud

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.147.8
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Fix invalid dates in front matter
        run: |
          find content/posts -name "index.md" -exec sed -i 's/date: 2024-20-25/date: 2024-12-25/g' {} +
          echo "=== Fixed invalid dates ==="

      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          echo "=== Hugo version ==="
          hugo version
          echo "=== Building site ==="
          hugo \
            --gc \
            --minify \
            --baseURL "https://hjian-blog-d6gy567xfbdddb2e8-1391215067.tcloudbaseapp.com"
          echo "=== Build output ==="
          ls -la public/

      # ── Deploy to COS (existing) ──────────────────────
      - name: Install coscmd
        run: pip install coscmd

      - name: Configure coscmd
        run: |
          coscmd config \
            -a ${{ secrets.TENCENT_SECRET_ID }} \
            -s ${{ secrets.TENCENT_SECRET_KEY }} \
            -b ${{ secrets.TENCENT_BUCKET }} \
            -r ${{ secrets.TENCENT_REGION }}

      - name: Upload to COS
        run: |
          echo "=== Uploading to COS ==="
          coscmd upload -r ./public /
          echo "=== Upload complete ==="

      # ── Deploy to CloudBase Static Hosting (new) ──────
      - name: Install CloudBase CLI
        run: npm install -g @cloudbase/cli

      - name: Deploy to CloudBase Static Hosting
        run: |
          cloudbase hosting deploy ./public / -e hjian-blog-d6gy567xfbdddb2e8 \
            --apiKeyId ${{ secrets.TENCENT_SECRET_ID }} \
            --apiKey ${{ secrets.TENCENT_SECRET_KEY }}
          echo "=== CloudBase deploy complete ==="