# Build Hugo site and upload to Tencent Cloud COS

name: Build and Deploy to Tencent Cloud

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.147.8
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.147.8'
          extended: true

      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          echo "=== Hugo version ==="
          hugo version
          echo "=== Building site ==="
          hugo \
            --gc \
            --minify \
            --baseURL "https://hjian.online/"
          echo "=== Build output ==="
          ls -la public/

      - name: Install coscmd
        run: |
          pip install coscmd

      - name: Configure coscmd
        run: |
          coscmd config \
            -a ${{ secrets.TENCENT_SECRET_ID }} \
            -s ${{ secrets.TENCENT_SECRET_KEY }} \
            -b ${{ secrets.TENCENT_BUCKET }} \
            -r ${{ secrets.TENCENT_REGION }}

      - name: Upload to COS
        run: |
          echo "=== Uploading to COS ==="
          coscmd upload -r ./public /
          echo "=== Upload complete ==="
