# Build Hugo site and upload to Tencent Cloud COS

name: Build and Deploy to Tencent Cloud

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.147.8
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.147.8'
          extended: true

      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          echo "=== Hugo version ==="
          hugo version
          echo "=== Building site ==="
          hugo \
            --gc \
            --minify \
            --baseURL "https://hjian.online/"
          echo "=== Build output ==="
          ls -la public/

      - name: Configure Tencent Cloud COS CLI
        uses: twbs/action-setup-coscli@v1
        with:
          secret_id: ${{ secrets.TENCENT_SECRET_ID }}
          secret_key: ${{ secrets.TENCENT_SECRET_KEY }}
          cos_base_url: "https://${{ secrets.TENCENT_BUCKET }}.cos.${{ secrets.TENCENT_REGION }}.myqcloud.com"

      - name: Upload to COS
        run: |
          echo "=== Uploading to COS ==="
          coscli cp -r ./public cos://${{ secrets.TENCENT_BUCKET }}/
          echo "=== Upload complete ==="
          echo "Site URL: https://${{ secrets.TENCENT_BUCKET }}.${{ secrets.TENCENT_REGION }}.cos.myqcloud.com"
